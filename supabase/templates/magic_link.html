<!doctype html>
<html>
  <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #2B2724; background: #FBF7F4; padding: 32px;">
    <div style="max-width: 480px; margin: 0 auto; background: #FFFFFF; border: 1px solid #E7DED6; border-radius: 16px; padding: 32px; text-align: center;">
      <h1 style="font-size: 22px; font-weight: 600; margin: 0 0 8px;">Your Union sign-in code</h1>
      <p style="font-size: 15px; color: #8A817C; margin: 0 0 24px;">
        Enter this code in the Union app to finish signing in.
      </p>
      <div style="font-size: 34px; font-weight: 700; letter-spacing: 8px; color: #2B2724; padding: 16px 0; background: #F3EBE4; border-radius: 12px; font-variant-numeric: tabular-nums;">
        {{ .Token }}
      </div>
      <p style="font-size: 13px; color: #8A817C; margin: 24px 0 0;">
        This code expires shortly and can only be used once. If you didn't
        request it, you can safely ignore this email.
      </p>
    </div>
  </body>
</html>
