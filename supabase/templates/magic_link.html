<!doctype html>
<html lang="en">
  <body style="margin:0;padding:0;background:#F7F1EE;font-family:'Instrument Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;color:#43353A;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#F7F1EE;padding:40px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:440px;background:#FFFFFF;border-radius:16px;padding:36px 32px;">
            <tr>
              <td align="center" style="padding-bottom:8px;">
                <div style="font-family:'Cormorant Garamond',Georgia,serif;font-size:32px;font-weight:600;color:#43353A;letter-spacing:0.3px;">Union</div>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding-bottom:20px;">
                <div style="font-family:'Cormorant Garamond',Georgia,serif;font-size:22px;font-weight:500;color:#43353A;">Your sign-in code</div>
              </td>
            </tr>
            <tr>
              <td align="center" style="font-size:15px;line-height:22px;color:#6B5A60;padding-bottom:22px;">
                Enter this code in the app to finish signing in.
              </td>
            </tr>
            <tr>
              <td align="center" style="padding-bottom:22px;">
                <div style="display:inline-block;background:#FBF4F1;border:1px solid #E8D9D3;border-radius:12px;padding:18px 28px;font-family:'SFMono-Regular',Menlo,Consolas,monospace;font-size:32px;font-weight:600;letter-spacing:8px;color:#B07C82;">{{ .Token }}</div>
              </td>
            </tr>
            <tr>
              <td align="center" style="font-size:13px;line-height:20px;color:#8A7B80;">
                This code expires in 1 hour. If you didn't ask for it, you can safely ignore this email.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
